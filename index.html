<script type="module">
import PocketBase from 'https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.es.mjs';

// =======================
// PocketBase Init
// =======================
const pbUrl =
    window.POCKETBASE_URL ||
    'http://pocketbase-jpw2m0j14hhmmcq9urvmecbr.176.112.158.3.sslip.io/';

const pb = new PocketBase(pbUrl);

let currentRole = 'admin';
let currentUser = null;

// =======================
// DOM Elements
// =======================
const loginScreen = document.getElementById('loginScreen');
const appContainer = document.getElementById('appContainer');

const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const loginError = document.getElementById('loginError');

const userInfo = document.getElementById('userInfo');

const addModal = document.getElementById('addModal');
const addEquipmentBtn = document.getElementById('addEquipmentBtn');

const equipmentName = document.getElementById('equipmentName');
const equipmentDescription = document.getElementById('equipmentDescription');
const submitBtn = document.getElementById('submitBtn');

const adminView = document.getElementById('adminView');
const workerView = document.getElementById('workerView');

const equipmentList = document.getElementById('equipmentList');
const workerEquipmentList = document.getElementById('workerEquipmentList');

// =======================
// Role Selection
// =======================
document.querySelectorAll('.role-option').forEach(option => {
    option.addEventListener('click', function () {
        document
            .querySelectorAll('.role-option')
            .forEach(o => o.classList.remove('selected'));

        this.classList.add('selected');
        currentRole = this.dataset.role;
    });
});

// =======================
// Login / Register
// =======================
loginBtn.addEventListener('click', async () => {
    const email = loginEmail.value.trim();
    const password = loginPassword.value.trim();

    if (!email || !password) {
        showError('Заполни все поля', loginError);
        return;
    }

    try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Загрузка...';

        try {
            await pb.collection('users')
                .authWithPassword(email, password);
        } catch (e) {

            // User not found -> register
            if (e.status === 400) {

                await pb.collection('users').create({
                    email,
                    password,
                    passwordConfirm: password,
                    role: currentRole
                });

                await pb.collection('users')
                    .authWithPassword(email, password);

            } else {
                throw e;
            }
        }

        currentUser = pb.authStore.model;

        console.log(currentUser);

        showApp();

    } catch (error) {
        showError(
            'Ошибка: ' + error.message,
            loginError
        );
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent =
            'Вход / Регистрация';
    }
});

// =======================
// Logout
// =======================
logoutBtn.addEventListener('click', () => {
    pb.authStore.clear();

    currentUser = null;

    loginEmail.value = '';
    loginPassword.value = '';

    loginError.classList.remove('show');

    showLogin();
});

// =======================
// UI
// =======================
function showLogin() {
    loginScreen.style.display = 'block';
    appContainer.classList.remove('active');
}

function showApp() {

    loginScreen.style.display = 'none';
    appContainer.classList.add('active');

    const role =
        currentUser?.role || 'worker';

    userInfo.textContent =
        `${currentUser.email} (${role})`;

    if (role === 'admin') {

        adminView.style.display = 'block';
        workerView.style.display = 'none';

        loadAdminView();

    } else {

        adminView.style.display = 'none';
        workerView.style.display = 'block';

        loadWorkerView();
    }
}

// =======================
// Admin
// =======================
addEquipmentBtn?.addEventListener(
    'click',
    () => addModal.classList.add('active')
);

submitBtn?.addEventListener(
    'click',
    async () => {

        const name =
            equipmentName.value.trim();

        const desc =
            equipmentDescription.value.trim();

        if (!name) {
            alert(
                'Введи название оборудования'
            );
            return;
        }

        try {

            await pb.collection('equipment')
                .create({
                    name,
                    description: desc,
                    created_by:
                        currentUser.id
                });

            closeModal();

            equipmentName.value = '';
            equipmentDescription.value = '';

            loadAdminView();

        } catch (error) {
            alert(
                'Ошибка: ' +
                error.message
            );
        }
    }
);

async function loadAdminView() {

    try {

        const records =
            await pb.collection('equipment')
                .getFullList();

        const usageCount =
            await pb.collection('usage')
                .getFullList();

        document.getElementById(
            'totalEquipment'
        ).textContent =
            records.length;

        document.getElementById(
            'usageCount'
        ).textContent =
            usageCount.length;

        equipmentList.innerHTML =
            '';

        if (records.length === 0) {

            equipmentList.innerHTML = `
                <div class="empty-state">
                    <p>
                        Нет оборудования.
                        Добавь первое!
                    </p>
                </div>
            `;

            return;
        }

        records.forEach(item => {

            const card =
                document.createElement(
                    'div'
                );

            card.className =
                'card';

            card.innerHTML = `
                <div class="card-info">
                    <h3>${item.name}</h3>

                    <p>
                        ${
                            item.description ||
                            'Нет описания'
                        }
                    </p>

                    <p style="
                        color:#667eea;
                        font-size:12px;
                        margin-top:8px;
                    ">
                        ID:
                        ${item.id.substring(0, 8)}
                    </p>
                </div>

                <div class="card-actions">
                    <button
                        class="
                            btn-small
                            btn-delete
                        "
                        onclick="
                            deleteEquipment(
                                '${item.id}'
                            )
                        "
                    >
                        Удалить
                    </button>
                </div>
            `;

            equipmentList
                .appendChild(card);
        });

    } catch (error) {

        equipmentList.innerHTML = `
            <div class="empty-state">
                <p>
                    Ошибка загрузки:
                    ${error.message}
                </p>
            </div>
        `;
    }
}

// =======================
// Worker View
// =======================
async function loadWorkerView() {

    try {

        const equipment =
            await pb.collection('equipment')
                .getFullList();

        const myUsage =
            await pb.collection('usage')
                .getFullList({
                    filter:
                        `used_by="${currentUser.id}"`
                });

        document.getElementById(
            'workerEquipmentCount'
        ).textContent =
            equipment.length;

        document.getElementById(
            'workerUsageCount'
        ).textContent =
            myUsage.length;

        workerEquipmentList
            .innerHTML = '';

        if (
            equipment.length === 0
        ) {

            workerEquipmentList
                .innerHTML = `
                <div class="empty-state">
                    <p>
                        Нет доступного
                        оборудования
                    </p>
                </div>
            `;

            return;
        }

        equipment.forEach(item => {

            const card =
                document.createElement(
                    'div'
                );

            card.className =
                'card';

            card.innerHTML = `
                <div class="card-info">
                    <h3>${item.name}</h3>

                    <p>
                        ${
                            item.description ||
                            'Нет описания'
                        }
                    </p>
                </div>

                <div class="card-actions">
                    <button
                        class="
                            btn-small
                            btn-use
                        "
                        onclick="
                            markUsage(
                                '${item.id}'
                            )
                        "
                    >
                        Отметить
                        использование
                    </button>
                </div>
            `;

            workerEquipmentList
                .appendChild(card);
        });

    } catch (error) {

        workerEquipmentList
            .innerHTML = `
            <div class="empty-state">
                <p>
                    Ошибка:
                    ${error.message}
                </p>
            </div>
        `;
    }
}

// =======================
// Global functions
// =======================
window.closeModal = () => {
    addModal.classList.remove(
        'active'
    );
};

window.deleteEquipment =
async (id) => {

    if (
        !confirm(
            'Уверен? Это удалит все использования оборудования'
        )
    ) return;

    try {

        await pb.collection(
            'equipment'
        ).delete(id);

        loadAdminView();

    } catch (error) {

        alert(
            'Ошибка: ' +
            error.message
        );
    }
};

window.markUsage =
async (equipmentId) => {

    try {

        await pb.collection(
            'usage'
        ).create({
            equipment:
                equipmentId,
            used_by:
                currentUser.id,
            used_at:
                new Date()
                    .toISOString()
        });

        alert(
            '✅ Использование отмечено!'
        );

        loadWorkerView();

    } catch (error) {

        alert(
            'Ошибка: ' +
            error.message
        );
    }
};

function showError(
    message,
    element
) {

    element.textContent =
        message;

    element.classList.add(
        'show'
    );

    setTimeout(() => {
        element.classList.remove(
            'show'
        );
    }, 5000);
}

// =======================
// Auto Auth
// =======================
if (pb.authStore.isValid) {

    currentUser =
        pb.authStore.model;

    showApp();

} else {
    showLogin();
}
</script>
