version: '3.8'

services:
  pocketbase:
    image: pocketbase/pocketbase:0.22.12
    container_name: inventory_pocketbase
    ports:
      - "80:80"
    volumes:
      - pb_data:/pb/pb_data
    environment:
      - ADMIN_EMAIL=admin@test.com
      - ADMIN_PASSWORD=admin123456
    networks:
      - inventory_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: inventory_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - inventory_net
    depends_on:
      - pocketbase
    restart: unless-stopped

networks:
  inventory_net:
    driver: bridge

volumes:
  pb_data:
    driver: local
