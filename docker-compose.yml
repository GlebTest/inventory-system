version: '3.8'

services:
  pocketbase:
    image: nouchka/pocketbase:latest
    container_name: inventory_pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    environment:
      - ADMIN_EMAIL=admin@test.com
      - ADMIN_PASSWORD=admin123456
    networks:
      - inventory_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  inventory_net:
    driver: bridge

volumes:
  pb_data:
    driver: local
